<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 104" width="104" height="104">
  <!-- Background -->
  <rect width="104" height="104" rx="8" fill="#1a1a2e"/>

  <!-- Off LEDs (dark) -->
  <!-- Col 0, rows 0-2 (off) -->
  <rect x="6" y="6" width="20" height="20" rx="3" fill="#2a2a3e"/>
  <rect x="6" y="30" width="20" height="20" rx="3" fill="#2a2a3e"/>
  <rect x="6" y="54" width="20" height="20" rx="3" fill="#2a2a3e"/>

  <!-- Col 1, row 0 (off) -->
  <rect x="30" y="6" width="20" height="20" rx="3" fill="#2a2a3e"/>

  <!-- Col 3, row 0 (off) -->
  <rect x="78" y="6" width="20" height="20" rx="3" fill="#2a2a3e"/>

  <!-- Lit LEDs -->
  <!-- Col 0: Red, height 1 (row 3 only) -->
  <rect x="6" y="78" width="20" height="20" rx="3" fill="#ff3333"/>

  <!-- Col 1: Yellow, height 3 (rows 1-3) -->
  <rect x="30" y="30" width="20" height="20" rx="3" fill="#ffcc00"/>
  <rect x="30" y="54" width="20" height="20" rx="3" fill="#ffcc00"/>
  <rect x="30" y="78" width="20" height="20" rx="3" fill="#ffcc00"/>

  <!-- Col 2: Green, height 4 (rows 0-3) -->
  <rect x="54" y="6" width="20" height="20" rx="3" fill="#33ff66"/>
  <rect x="54" y="30" width="20" height="20" rx="3" fill="#33ff66"/>
  <rect x="54" y="54" width="20" height="20" rx="3" fill="#33ff66"/>
  <rect x="54" y="78" width="20" height="20" rx="3" fill="#33ff66"/>

  <!-- Col 3: Blue, height 3 (rows 1-3) -->
  <rect x="78" y="30" width="20" height="20" rx="3" fill="#3399ff"/>
  <rect x="78" y="54" width="20" height="20" rx="3" fill="#3399ff"/>
  <rect x="78" y="78" width="20" height="20" rx="3" fill="#3399ff"/>
</svg>
